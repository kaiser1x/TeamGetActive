  <!-- Star bottom-left -->
  <polygon points="28,130 30,138 38,138 32,143 34,151 28,146 22,151 24,143 18,138 26,138" fill="#45B7D1"/>
  <!-- Star bottom-right -->
  <polygon points="172,130 174,138 182,138 176,143 178,151 172,146 166,151 168,143 162,138 170,138" fill="#96CEB4"/>
  <!-- Shine dots -->
  <circle cx="100" cy="24" r="7" fill="#FFEAA7"/>
  <circle cx="180" cy="90" r="5" fill="#FD79A8"/>
  <circle cx="20" cy="90" r="5" fill="#74B9FF"/>
